backend:
  name: git-gateway
  branch: main

# ── MEDIA — upload photos to any folder ──
media_folder: "photos"
public_folder: "/photos"

# ── COLLECTIONS ──
collections:

  # ── NEWS ARTICLES ──
  - name: "news"
    label: "📰 News Articles"
    label_singular: "News Article"
    folder: "_data/news"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "date", format: "MMMM YYYY" }
      - { label: "Category", name: "category", widget: "select", options: ["Programme Update", "Kindergarten", "WKPI", "Tailoring", "Clinic", "Safe House", "School Sponsorship", "Sanitary Pads", "Relief Food", "Street Work", "General"] }
      - { label: "Short Summary", name: "summary", widget: "text", hint: "1-2 sentences shown on the news listing page" }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Article Content", name: "content", widget: "markdown" }

  # ── PROJECT PAGES ──
  - name: "projects"
    label: "🏗️ Project Pages"
    label_singular: "Project"
    files:
      - label: "Mobile Youth Work & Child Advocacy"
        name: "mobile-youth-advocacy"
        file: "_data/projects/mobile-youth-advocacy.json"
        fields: &project_fields
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Page Tagline", name: "tagline", widget: "text" }
          - { label: "Main Paragraph 1", name: "intro_p1", widget: "text" }
          - { label: "Main Paragraph 2", name: "intro_p2", widget: "text", required: false }
          - { label: "Main Paragraph 3", name: "intro_p3", widget: "text", required: false }
          - label: "Impact Cards (4 numbers/stats)"
            name: "impact_cards"
            widget: "list"
            max: 4
            fields:
              - { label: "Number / Word", name: "num", widget: "string", hint: "e.g. 2,400 or 100% Free" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Quick Facts (sidebar)"
            name: "quick_facts"
            widget: "list"
            max: 4
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - label: "How It Works Steps"
            name: "steps"
            widget: "list"
            max: 5
            fields:
              - { label: "Step Title", name: "title", widget: "string" }
              - { label: "Step Description", name: "text", widget: "text" }

      - label: "Safe House for Street Girls"
        name: "safe-house"
        file: "_data/projects/safe-house.json"
        fields: *project_fields

      - label: "Sanitary Pads Programme"
        name: "sanitary-pads"
        file: "_data/projects/sanitary-pads.json"
        fields: *project_fields

      - label: "Relief Food Programme"
        name: "relief-food"
        file: "_data/projects/relief-food.json"
        fields: *project_fields

      - label: "School Sponsorship"
        name: "school-sponsorship"
        file: "_data/projects/school-sponsorship.json"
        fields: *project_fields

      - label: "Street Work"
        name: "street-work"
        file: "_data/projects/street-work.json"
        fields: *project_fields

      - label: "Lobby & Advocacy"
        name: "lobby-advocacy"
        file: "_data/projects/lobby-advocacy.json"
        fields: *project_fields

      - label: "Research & Publication"
        name: "research-publication"
        file: "_data/projects/research-publication.json"
        fields: *project_fields

      - label: "Kindergarten Programme"
        name: "kindergarten"
        file: "_data/projects/kindergarten.json"
        fields: *project_fields

      - label: "Tailoring & Dressmaking"
        name: "tailoring"
        file: "_data/projects/tailoring.json"
        fields: *project_fields

      - label: "Community Clinic"
        name: "clinic"
        file: "_data/projects/clinic.json"
        fields: *project_fields

      - label: "Western Kenya Peace Initiative (WKPI)"
        name: "wkpi"
        file: "_data/projects/wkpi.json"
        fields: *project_fields

  # ── ABOUT PAGE ──
  - name: "about"
    label: "👥 About Page"
    files:
      - label: "About Page"
        name: "about"
        file: "_data/pages/about.json"
        fields:
          - { label: "Page Title", name: "hero_title", widget: "string" }
          - { label: "Page Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Our Story — Heading", name: "story_title", widget: "string" }
          - { label: "Our Story — Lead Paragraph", name: "story_lead", widget: "text" }
          - { label: "Our Story — Paragraph 1", name: "story_p1", widget: "text" }
          - { label: "Our Story — Paragraph 2", name: "story_p2", widget: "text" }
          - label: "Timeline"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "text", widget: "text" }
          - label: "Core Values"
            name: "values"
            widget: "list"
            fields:
              - { label: "Emoji Icon", name: "icon", widget: "string" }
              - { label: "Value Name", name: "title", widget: "string" }
              - { label: "Description", name: "text", widget: "text" }

  # ── VOLUNTEER PAGE ──
  - name: "volunteer"
    label: "🙋 Volunteer Page"
    files:
      - label: "Volunteer Page"
        name: "volunteer"
        file: "_data/pages/volunteer.json"
        fields:
          - { label: "Page Title", name: "hero_title", widget: "string" }
          - { label: "Page Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Intro Heading", name: "intro_title", widget: "string" }
          - { label: "Intro Lead Text", name: "intro_lead", widget: "text" }
          - label: "Volunteer Roles"
            name: "roles"
            widget: "list"
            fields:
              - { label: "Emoji Icon", name: "icon", widget: "string" }
              - { label: "Role Title", name: "title", widget: "string" }
              - { label: "Description", name: "text", widget: "text" }
          - { label: "How to Apply — Text", name: "apply_text", widget: "text" }
          - { label: "Minimum Duration", name: "min_duration", widget: "string" }

  # ── SITE SETTINGS ──
  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - label: "Homepage"
        name: "homepage"
        file: "_data/homepage.json"
        fields:
          - { label: "Hero Headline", name: "hero_headline", widget: "string" }
          - { label: "Hero Subheadline", name: "hero_subheadline", widget: "string" }
          - label: "Stats Banner"
            name: "stats"
            widget: "list"
            max: 4
            fields:
              - { label: "Number or Word", name: "num", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - { label: "About Section — Paragraph 1", name: "about_p1", widget: "text" }
          - { label: "About Section — Paragraph 2", name: "about_p2", widget: "text" }
          - { label: "Vision Quote", name: "vision_quote", widget: "string" }

      - label: "Contact & Organisation Info"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - { label: "Organisation Name", name: "org_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Physical Address", name: "address", widget: "text" }
          - { label: "Postal Address", name: "postal", widget: "string", required: false }
          - { label: "Founder / Director Name", name: "director", widget: "string" }

      - label: "Social Media Links"
        name: "social"
        file: "_data/social.json"
        fields:
          - { label: "Facebook URL", name: "facebook", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "Twitter/X URL", name: "twitter", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string", hint: "International format e.g. 254712345678" }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }

      - label: "Donate Page"
        name: "donate"
        file: "_data/donate.json"
        fields:
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Bank Name", name: "bank_name", widget: "string" }
          - { label: "Account Name", name: "account_name", widget: "string" }
          - { label: "Account Number", name: "account_number", widget: "string" }
          - { label: "Bank Branch", name: "bank_branch", widget: "string" }
          - { label: "SWIFT / BIC Code", name: "swift", widget: "string", required: false }
          - { label: "M-Pesa Paybill / Till Number", name: "mpesa", widget: "string", required: false }
          - { label: "PayPal Email", name: "paypal", widget: "string", required: false }

      - label: "News Article Order"
        name: "news_index"
        file: "_data/news-index.json"
        fields:
          - label: "Article Slugs (newest first)"
            name: "items"
            widget: "list"
            field: { label: "Slug", name: "slug", widget: "string", hint: "Filename without .json" }
