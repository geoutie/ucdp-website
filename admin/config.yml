backend:
  name: git-gateway
  branch: main

media_folder: "photos/news"
public_folder: "/photos/news"

# ── COLLECTIONS ──
collections:

  # ── NEWS ARTICLES ──
  - name: "news"
    label: "📰 News Articles"
    label_singular: "News Article"
    folder: "_data/news"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "The headline of this news article" }
      - { label: "Date", name: "date", widget: "date", format: "MMMM YYYY", hint: "e.g. January 2026" }
      - { label: "Category", name: "category", widget: "select", options: ["Programme Update", "Kindergarten", "WKPI", "Tailoring", "Clinic", "Safe House", "School Sponsorship", "Sanitary Pads", "Relief Food", "Street Work", "General"] }
      - { label: "Short Summary", name: "summary", widget: "text", hint: "1-2 sentences shown on the news listing page" }
      - { label: "Cover Image", name: "image", widget: "image", required: false, hint: "Upload a photo for this article" }
      - { label: "Article Content", name: "content", widget: "markdown", hint: "Full article text. Use the toolbar to add headings, bold, lists, etc." }

  # ── SITE SETTINGS ──
  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - label: "Homepage"
        name: "homepage"
        file: "_data/homepage.json"
        fields:
          - label: "Hero Headline"
            name: "hero_headline"
            widget: "string"
            hint: "Main headline on the homepage hero banner"
          - label: "Hero Subheadline"
            name: "hero_subheadline"
            widget: "string"
          - label: "Stats Banner"
            name: "stats"
            widget: "list"
            max: 4
            fields:
              - { label: "Number or Word", name: "num", widget: "string", hint: "e.g. 2002, 5, Kisumu" }
              - { label: "Label", name: "label", widget: "string", hint: "e.g. Year Founded" }
          - label: "About Section — Main Paragraph"
            name: "about_p1"
            widget: "text"
          - label: "About Section — Second Paragraph"
            name: "about_p2"
            widget: "text"
          - label: "Vision Quote"
            name: "vision_quote"
            widget: "string"

      - label: "Contact & Organisation Info"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - { label: "Organisation Name", name: "org_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Physical Address", name: "address", widget: "text" }
          - { label: "Postal Address", name: "postal", widget: "string", required: false }
          - { label: "Founder / Director Name", name: "director", widget: "string" }

      - label: "Social Media Links"
        name: "social"
        file: "_data/social.json"
        fields:
          - { label: "Facebook URL", name: "facebook", widget: "string", hint: "Full URL e.g. https://facebook.com/UCDPKisumu" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "Twitter/X URL", name: "twitter", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string", hint: "International format e.g. 254712345678" }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }

      - label: "News Article Order"
        name: "news_index"
        file: "_data/news-index.json"
        description: "Controls the order news articles appear. The first slug at the top is the most recent. Add new article slugs here when you publish a new article."
        fields:
          - label: "Article Slugs (in order, newest first)"
            name: "items"
            widget: "list"
            field: { label: "Slug", name: "slug", widget: "string", hint: "The filename of the article without .json — e.g. new-sanitary-pads-drive" }


        name: "donate"
        file: "_data/donate.json"
        fields:
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Bank Name", name: "bank_name", widget: "string" }
          - { label: "Account Name", name: "account_name", widget: "string" }
          - { label: "Account Number", name: "account_number", widget: "string" }
          - { label: "Bank Branch", name: "bank_branch", widget: "string" }
          - { label: "SWIFT / BIC Code", name: "swift", widget: "string", required: false }
          - { label: "M-Pesa Paybill / Till Number", name: "mpesa", widget: "string", required: false }
          - { label: "PayPal Email", name: "paypal", widget: "string", required: false }
